    <path d="M67 92V101C67 108 73 114 80 114H97C104 114 110 108 110 101V95" stroke="url(#markGradient)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="110" cy="91" r="14" fill="#F8FAFC" stroke="url(#markGradient)" stroke-width="6"/>
    <circle cx="110" cy="91" r="4" fill="#3B82F6"/>
    <path d="M47 45L37 55L47 65" stroke="url(#markGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M82 45L92 55L82 65" stroke="url(#markGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 39L60 71" stroke="url(#markGradient)" stroke-width="6" stroke-linecap="round"/>
  </g>

